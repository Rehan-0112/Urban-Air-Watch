name: AQI Data Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy python-dotenv schedule

      - name: Run pipeline once
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: |
          python src/data_pipeline.py &
          sleep 60
          kill %1 || true

      - name: Commit and push new data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto: pipeline run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
